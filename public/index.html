<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1E40AF">
  <meta name="description" content="HabitForge – Build habits, earn rewards, grow 1% every day with AI coaching">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HabitForge">
  <title>HabitForge – Habit Tracker</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="offline-banner">📴 You're offline — showing cached data</div>

  <!-- AUTH SCREENS (shown when not logged in) -->
  <div id="auth-screen" style="display:none;">
    <div class="auth-wrap">
      <div class="auth-card">
        <div id="auth-container"></div>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" style="display:none;">
    <!-- Pages -->
    <div id="page-dashboard" class="page"></div>
    <div id="page-habits" class="page"></div>
    <div id="page-diary" class="page"></div>
    <div id="page-stats" class="page"></div>
    <div id="page-settings" class="page"></div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <button class="nav-item" data-page="dashboard" id="nav-dashboard">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-item" data-page="habits" id="nav-habits">
        <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        <span>Habits</span>
      </button>
      <button class="nav-item" data-page="diary" id="nav-diary">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Diary</span>
      </button>
      <button class="nav-item" data-page="stats" id="nav-stats">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Stats</span>
      </button>
      <button class="nav-item" data-page="settings" id="nav-settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Settings</span>
      </button>
    </nav>
  </div>

  <!-- TOAST CONTAINER -->
  <div id="toast-container"></div>

  <!-- MODAL CONTAINER -->
  <div id="modal-container"></div>

  <!-- SCRIPTS -->
  <script src="/js/api.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/crypto.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/habits.js"></script>
  <script src="/js/rewards.js"></script>
  <script src="/js/punishments.js"></script>
  <script src="/js/challenges.js"></script>
  <script src="/js/stats.js"></script>
  <script src="/js/diary.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
